<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>รักมั้ยยย? 💕</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }

  #app {
    font-family: 'Sarabun', sans-serif;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    background: linear-gradient(145deg, #ffe0ef 0%, #fce4f5 40%, #e8d5f5 100%);
    position: relative; overflow: hidden; padding: 20px;
  }

  .petals-container { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:0; }
  .petal { position:absolute; top:-30px; opacity:0.7; animation: fall linear infinite; }
  @keyframes fall {
    0% { transform: translateY(-30px) rotate(0deg); opacity:0.8; }
    100% { transform: translateY(110vh) rotate(360deg); opacity:0; }
  }

  .card {
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    border-radius: 32px; padding: 40px 36px 36px;
    max-width: 400px; width: 100%; text-align: center;
    box-shadow: 0 20px 60px rgba(230,80,140,0.18), 0 4px 20px rgba(200,60,120,0.1);
    position: relative; z-index: 1;
    border: 1.5px solid rgba(255,180,210,0.5);
  }

  /* Name Page */
  #namePage { display:flex; flex-direction:column; align-items:center; }
  #namePage .icon { font-size:52px; margin-bottom:12px; animation: heartbeat 1.4s ease-in-out infinite; }
  @keyframes heartbeat {
    0%,100%{transform:scale(1);} 30%{transform:scale(1.18);} 50%{transform:scale(1.08);} 70%{transform:scale(1.18);}
  }
  #namePage h1 { font-size: clamp(1.4rem,5vw,1.9rem); font-weight:700; color:#d63877; margin-bottom:8px; }
  #namePage p  { font-size:0.88rem; color:#c06090; margin-bottom:20px; opacity:0.8; }

  .name-input-wrap { position:relative; width:100%; margin-bottom:12px; }
  .name-input-wrap input {
    width:100%; padding:13px 44px 13px 18px;
    border:2px solid rgba(220,100,160,0.35); border-radius:50px;
    font-size:1rem; font-family:'Sarabun',sans-serif; color:#c03070;
    background:rgba(255,240,248,0.7); outline:none;
    transition:border-color 0.2s, box-shadow 0.2s;
  }
  .name-input-wrap input:focus {
    border-color:#f05a99;
    box-shadow:0 0 0 3px rgba(240,90,153,0.15);
  }
  .name-input-wrap input::placeholder { color:rgba(190,100,140,0.5); }
  .name-input-wrap .input-icon { position:absolute; right:16px; top:50%; transform:translateY(-50%); font-size:18px; pointer-events:none; }

  .btn-start {
    padding:13px 36px; margin-top:6px;
    background: linear-gradient(135deg,#f05a99,#e0348a);
    color:white; border:none; border-radius:50px;
    font-size:1.05rem; font-family:'Sarabun',sans-serif; font-weight:700;
    cursor:pointer; box-shadow:0 6px 24px rgba(220,60,130,0.35);
    transition:transform 0.15s, box-shadow 0.15s;
    width:100%;
  }
  .btn-start:hover { transform:translateY(-2px); box-shadow:0 10px 28px rgba(220,60,130,0.4); }
  .btn-start:active { transform:scale(0.97); }

  .share-hint {
    margin-top:14px; font-size:0.75rem; color:#c090b0;
    border-top:1px dashed rgba(220,100,160,0.2); padding-top:12px; line-height:1.8;
    width:100%; text-align:center;
  }
  .share-hint code {
    background:rgba(240,100,160,0.08); border-radius:6px;
    padding:2px 8px; font-size:0.72rem; color:#d06090;
    word-break:break-all; user-select:all; cursor:pointer; display:block; margin-top:4px;
  }

  /* Question Page */
  #questionPage { display:none; flex-direction:column; align-items:center; }
  .gif-wrap { margin:0 auto 18px; border-radius:20px; overflow:hidden; width:min(180px,55vw); box-shadow:0 8px 30px rgba(210,60,120,0.2); }
  .gif-wrap img { width:100%; display:block; }
  #questionPage h1 { font-size:clamp(1.3rem,5vw,1.9rem); font-weight:700; color:#d63877; margin-bottom:8px; line-height:1.4; }
  .subtitle { font-size:0.88rem; color:#c06090; margin-bottom:26px; opacity:0.8; }

  .btn-row { display:flex; gap:16px; justify-content:center; }
  .btn-yes {
    padding:13px 32px;
    background:linear-gradient(135deg,#f05a99,#e0348a);
    color:white; border:none; border-radius:50px;
    font-size:1.05rem; font-family:'Sarabun',sans-serif; font-weight:700;
    cursor:pointer; box-shadow:0 6px 24px rgba(220,60,130,0.35);
    transition:transform 0.15s, box-shadow 0.15s;
  }
  .btn-yes:hover { transform:translateY(-3px) scale(1.04); box-shadow:0 10px 30px rgba(220,60,130,0.45); }
  .btn-yes:active { transform:scale(0.97); }
  .btn-no-placeholder { padding:13px 32px; border-radius:50px; font-size:1.05rem; opacity:0; pointer-events:none; min-width:90px; }

  .btn-no {
    padding:13px 32px;
    background:rgba(255,255,255,0.75); color:#c06090;
    border:2px solid rgba(220,100,160,0.35); border-radius:50px;
    font-size:1.05rem; font-family:'Sarabun',sans-serif; font-weight:700;
    cursor:pointer; position:fixed; z-index:10;
    transition:left 0.18s ease, top 0.18s ease;
    display:none;
  }

  .no-counter { margin-top:14px; font-size:0.82rem; color:#d06090; min-height:18px; opacity:0.75; }

  /* Love Page */
  #lovePage { display:none; flex-direction:column; align-items:center; }
  .love-gif-wrap {
    border-radius:20px; overflow:hidden; width:min(200px,60vw);
    box-shadow:0 8px 30px rgba(210,60,120,0.2); margin-bottom:18px;
    animation:popIn 0.5s cubic-bezier(0.175,0.885,0.32,1.275) forwards;
  }
  .love-gif-wrap img { width:100%; display:block; }
  @keyframes popIn { 0%{transform:scale(0);opacity:0;} 100%{transform:scale(1);opacity:1;} }
  .love-title { font-size:clamp(1.3rem,5vw,1.9rem); font-weight:700; color:#d63877; margin-bottom:8px; line-height:1.4; animation:slideUp 0.5s 0.15s ease both; }
  .love-msg { font-size:0.95rem; color:#c06090; animation:slideUp 0.5s 0.3s ease both; line-height:1.6; }
  .confetti-row { margin-top:18px; font-size:1.4rem; letter-spacing:8px; animation:slideUp 0.5s 0.45s ease both; }
  @keyframes slideUp { 0%{transform:translateY(20px);opacity:0;} 100%{transform:translateY(0);opacity:1;} }

  .btn-restart {
    margin-top:22px; padding:10px 26px;
    background:rgba(255,255,255,0.7); color:#c06090;
    border:2px solid rgba(220,100,160,0.3); border-radius:50px;
    font-size:0.88rem; font-family:'Sarabun',sans-serif; font-weight:600;
    cursor:pointer; animation:slideUp 0.5s 0.6s ease both;
    transition:background 0.15s;
  }
  .btn-restart:hover { background:rgba(255,220,235,0.7); }
</style>
</head>
<body>
<div id="app">
  <div class="petals-container" id="petals"></div>

  <div class="card">

    <!-- Page 0: กรอกชื่อ -->
    <div id="namePage">
      <span class="icon">💕</span>
      <h1>ใส่ชื่อทั้งคู่เลย~</h1>
      <p>แล้วเอาลิงก์ไปส่งให้เค้ากดนะ</p>
      <div class="name-input-wrap">
        <input id="name1Input" type="text" placeholder="ชื่อฉัน (คนส่ง)..." maxlength="30" autocomplete="off" />
        <span class="input-icon">🌸</span>
      </div>
      <div class="name-input-wrap">
        <input id="name2Input" type="text" placeholder="ชื่อเค้า (คนรับ)..." maxlength="30" autocomplete="off" />
        <span class="input-icon">💕</span>
      </div>
      <button class="btn-start" onclick="startWithName()">สร้างลิงก์ส่งให้เค้า 💌</button>
      <div class="share-hint" id="shareHint"></div>
    </div>

    <!-- Page 1: คำถาม -->
    <div id="questionPage">
      <div class="gif-wrap">
        <img src="https://media.giphy.com/media/MpNy5P7x5vWM0/giphy.gif" alt="nervous cat">
      </div>
      <h1 id="questionText">รักเค้ามั้ยยย? 💕</h1>
      <p class="subtitle">คิดดีๆ นะ ก่อนจะตอบ...</p>
      <div class="btn-row">
        <button class="btn-yes" onclick="showLove()">รัก ❤️</button>
        <div class="btn-no-placeholder" aria-hidden="true">ไม่ 😒</div>
      </div>
      <div class="no-counter" id="noCounter"></div>
    </div>

    <!-- Page 2: รัก! -->
    <div id="lovePage">
      <div class="love-gif-wrap">
        <img src="https://media.giphy.com/media/MDJ9IbxxvDUQM/giphy.gif" alt="love gif">
      </div>
      <h1 class="love-title" id="loveTitle">รู้อยู่แล้วว่าต้องรัก!</h1>
      <p class="love-msg" id="loveMsg">หัวใจมันบอกอยู่แล้วนี่หนา 💕</p>
      <div class="confetti-row">🎉✨💕🎊</div>
      <button class="btn-restart" onclick="restart()">ส่งให้คนอื่น 🔄</button>
    </div>

  </div>

  <button class="btn-no" id="noBtn" onclick="dodgeNo()">ไม่ 😒</button>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  let name1 = (params.get('n1') || '').trim();
  let name2 = (params.get('n2') || '').trim();

  if (name1 && name2) {
    goToQuestion(name1, name2);
  }

  // Enter ข้ามช่อง
  document.getElementById('name1Input').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('name2Input').focus();
  });
  document.getElementById('name2Input').addEventListener('keydown', e => {
    if (e.key === 'Enter') startWithName();
  });

  function startWithName() {
    const v1 = document.getElementById('name1Input').value.trim();
    const v2 = document.getElementById('name2Input').value.trim();
    const inp1 = document.getElementById('name1Input');
    const inp2 = document.getElementById('name2Input');

    if (!v1) { inp1.focus(); inp1.style.borderColor='#f05a99'; setTimeout(()=>inp1.style.borderColor='',800); return; }
    if (!v2) { inp2.focus(); inp2.style.borderColor='#f05a99'; setTimeout(()=>inp2.style.borderColor='',800); return; }

    const url = new URL(window.location.href);
    url.searchParams.set('n1', v1);
    url.searchParams.set('n2', v2);
    history.replaceState(null, '', url.toString());

    // แสดงลิงก์ + ปุ่มก็อป
    const hint = document.getElementById('shareHint');
    hint.innerHTML = 'คัดลอกลิงก์นี้ส่งให้ <strong style="color:#d63877">' + v2 + '</strong> เปิดนะ~<br><code id="linkCode">' + url.toString() + '</code>';
    const copyBtn = document.createElement('button');
    copyBtn.textContent = '📋 คัดลอกลิงก์';
    copyBtn.style.cssText = 'margin-top:8px;padding:7px 18px;background:linear-gradient(135deg,#f05a99,#e0348a);color:white;border:none;border-radius:50px;font-size:0.82rem;font-family:Sarabun,sans-serif;font-weight:700;cursor:pointer;';
    copyBtn.onclick = () => {
      navigator.clipboard.writeText(url.toString()).then(() => {
        copyBtn.textContent = '✅ คัดลอกแล้ว!';
        setTimeout(() => copyBtn.textContent = '📋 คัดลอกลิงก์', 2000);
      });
    };
    hint.appendChild(document.createElement('br'));
    hint.appendChild(copyBtn);
  }

  function goToQuestion(n1, n2) {
    // "(n1)รัก(n2)นะ แล้ว(n2)รักเค้ามั้ย?"
    document.getElementById('questionText').textContent = n1 + 'รัก' + n2 + 'นะ แล้ว' + n2 + 'รักเค้ามั้ย? 💕';
    document.getElementById('loveTitle').textContent = n2 + 'รัก' + n1 + 'ด้วยยย! 💖';
    document.getElementById('loveMsg').innerHTML = 'รู้อยู่แล้วว่าใจมันบอก~<br>' + n1 + ' จะดีใจมากเลยนะ 💕';

    document.getElementById('namePage').style.display = 'none';
    document.getElementById('questionPage').style.display = 'flex';
    document.getElementById('noBtn').style.display = 'block';

    noCount = 0;
    document.getElementById('noCounter').textContent = '';
    setTimeout(positionNoBtn, 80);
  }

  function restart() {
    const url = new URL(window.location.href);
    url.searchParams.delete('n1');
    url.searchParams.delete('n2');
    history.replaceState(null, '', url.toString());

    document.getElementById('lovePage').style.display = 'none';
    document.getElementById('questionPage').style.display = 'none';
    document.getElementById('noBtn').style.display = 'none';
    document.getElementById('namePage').style.display = 'flex';
    document.getElementById('shareHint').innerHTML = '';
    document.getElementById('name1Input').value = '';
    document.getElementById('name2Input').value = '';
    document.getElementById('name1Input').focus();
  }

  // ปุ่มหนี
  let noCount = 0;
  const noBtn = document.getElementById('noBtn');
  const noCounter = document.getElementById('noCounter');
  const msgs = [
    "หลอกตัวเองอยู่นะ 😏","แน่ใจแล้วหรอ? 🤨","โกหกใครอยู่อ่ะ 😤",
    "กดไม่ถูกเลย~ 🙈","ยิ่งหนีก็ยิ่งรัก 💓","เลิกพยายามเลย 🫣","รักแน่ๆ เลย! 💘"
  ];

  function positionNoBtn() {
    const bw = noBtn.offsetWidth || 120;
    const bh = noBtn.offsetHeight || 50;
    const card = document.querySelector('.card');
    const cr = card.getBoundingClientRect();
    const currentLeft = parseFloat(noBtn.style.left) || (window.innerWidth/2 - bw/2);
    const currentTop  = parseFloat(noBtn.style.top)  || (cr.bottom + 20);
    const pad = 24, flee = 160;
    let nx, ny, tries = 0;
    do {
      const angle = Math.random() * 2 * Math.PI;
      const dist  = 80 + Math.random() * flee;
      nx = currentLeft + Math.cos(angle) * dist;
      ny = currentTop  + Math.sin(angle) * dist;
      tries++;
    } while (
      tries < 20 && (
        nx < pad || nx + bw > window.innerWidth - pad ||
        ny < pad || ny + bh > window.innerHeight - pad ||
        (nx < cr.right + 30 && nx + bw > cr.left - 30 && ny < cr.bottom + 30 && ny + bh > cr.top - 30)
      )
    );
    nx = Math.max(pad, Math.min(nx, window.innerWidth - bw - pad));
    ny = Math.max(pad, Math.min(ny, window.innerHeight - bh - pad));
    noBtn.style.left = nx + 'px';
    noBtn.style.top  = ny + 'px';
    noBtn.style.right = 'auto'; noBtn.style.bottom = 'auto';
  }

  function dodgeNo() {
    noCount++;
    noCounter.textContent = msgs[Math.min(noCount - 1, msgs.length - 1)];
    positionNoBtn();
  }

  noBtn.addEventListener('mouseover', positionNoBtn);
  noBtn.addEventListener('touchstart', function(e){ e.preventDefault(); dodgeNo(); });
  window.addEventListener('resize', positionNoBtn);

  function showLove() {
    document.getElementById('questionPage').style.display = 'none';
    document.getElementById('lovePage').style.display = 'flex';
    noBtn.style.display = 'none';
    makeBurst();
  }

  function makeBurst() {
    const emojis = ['💖','💕','✨','🌸','💗','🎉','💞','🌷'];
    for (let i = 0; i < 30; i++) {
      const el = document.createElement('div');
      el.style.cssText = 'position:fixed;pointer-events:none;z-index:999;font-size:' + (16+Math.random()*18) + 'px;left:' + (Math.random()*100) + 'vw;top:' + (Math.random()*100) + 'vh;animation:burstFly ' + (0.8+Math.random()*1.2) + 's ease forwards;';
      el.textContent = emojis[Math.floor(Math.random()*emojis.length)];
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 2200);
    }
  }

  const s = document.createElement('style');
  s.textContent = '@keyframes burstFly{0%{transform:scale(0) rotate(0deg);opacity:1;}60%{opacity:1;}100%{transform:scale(1.5) translateY(-70px) rotate(180deg);opacity:0;}}';
  document.head.appendChild(s);

  const petalEmojis = ['🌸','🌺','💮','🌷','✿','❀'];
  const petalsEl = document.getElementById('petals');
  for (let i = 0; i < 18; i++) {
    const p = document.createElement('div');
    p.className = 'petal';
    p.textContent = petalEmojis[Math.floor(Math.random()*petalEmojis.length)];
    p.style.left = (Math.random()*100)+'vw';
    p.style.animationDuration = (4+Math.random()*6)+'s';
    p.style.animationDelay = (Math.random()*6)+'s';
    p.style.fontSize = (12+Math.random()*14)+'px';
    petalsEl.appendChild(p);
  }
</script>
</body>
</html>
